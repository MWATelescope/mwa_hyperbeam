---
name: Release

# Build and test on all pushes and pull requests, but only publish on tagged commits
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-release:
    name: Build release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - macos-15-intel
          - macos-15
          - ubuntu-24.04-arm

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: (macos) install dependencies
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          brew install automake autoconf pkg-config hdf5
      - name: (ubuntu) install dependencies
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt -y update
          sudo apt -y install libhdf5-dev gcc pkg-config python3 curl wget git jq

      - name: Install Rust, stable minimal toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Python 3.10
        uses: actions/setup-python@v6
        continue-on-error: true
        with:
          python-version: "3.10"

      - name: Add Python 3.11
        uses: actions/setup-python@v6
        continue-on-error: true
        with:
          python-version: "3.11"

      - name: Add Python 3.12
        uses: actions/setup-python@v6
        continue-on-error: true
        with:
          python-version: "3.12"

      - name: install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin

      - name: build mwa_hyperbeam
        run: |
          # Copy the release readme to the project root so it can neatly be put in the
          # release tarballs.
          cp .github/workflows/releases-readme.md README.md

          # Because we've compiled HDF5 and ERFA into hyperbeam products, we
          # legally must distribute their licenses with the products.
          curl -L https://raw.githubusercontent.com/HDFGroup/hdf5/develop/COPYING -o COPYING-hdf5
          curl -L https://raw.githubusercontent.com/liberfa/erfa/master/LICENSE -o LICENSE-erfa

          export TAG="$(git describe --tags)"
          export VER="v$(grep version Cargo.toml -m1 | cut -d' ' -f3 | tr -d '"')"
          export REF="${{ github.ref_name }}"
          echo "TAG=$TAG, VER=$VER, REF=$REF"

          # determine which target cpus for rustc to build for from machine type
          export ARCH="$(uname -m)"
          case $ARCH in
            x86_64)
              if [[ "$OSTYPE" == "linux-gnu"* ]]; then
                export TARGETS="x86-64 x86-64-v2 x86-64-v3"
              else
                export TARGETS="x86-64"
              fi
              ;;
            arm64) export TARGETS="apple-m1" ;;
            aarch64) export TARGETS="generic" ;;
            *) echo "unknown arch (uname -m) $ARCH"; exit 1 ;;
          esac

          # determine which library file extensions to include in archive from kernel
          export KERNEL="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case $KERNEL in
            darwin*) export LIB_GLOB="{a,dylib}" ;;
            linux*) export LIB_GLOB="{a,so}" ;;
            *) echo "unknown kernel (uname -s) $KERNEL"; exit 1 ;;
          esac

          # determine which python versions are available
          export PYTHONS=$(maturin list-python 2>&1 | grep CPython | cut -d' ' -f 4 | tr $'\n' ' ')

          for TARGET in $TARGETS; do
            echo "building target $TARGET"
            export RUSTFLAGS="-C target-cpu=$TARGET"
            # Build python first
            maturin build --release --features python,all-static --strip -i $PYTHONS
            # Build C objects
            cargo build --release --features all-static

            # Create new release asset tarballs
            eval mv target/wheels/*.whl target/release/libmwa_hyperbeam.${LIB_GLOB} include/mwa_hyperbeam.h .
            eval tar -acvf mwa_hyperbeam-${TAG}-${KERNEL}-${TARGET}.tar.gz \
                LICENSE COPYING-hdf5 LICENSE-erfa README.md CHANGELOG.md \
                libmwa_hyperbeam.${LIB_GLOB} mwa_hyperbeam.h
            eval tar -acvf mwa_hyperbeam-${TAG}-${KERNEL}-${TARGET}-python.tar.gz \
                LICENSE COPYING-hdf5 LICENSE-erfa README.md CHANGELOG.md \
                ./*.whl
          done

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}.tar.gz
          path: "*.tar.gz"
          if-no-files-found: error

      - name: Test Python wheels
        run: |
          # Download the HDF5 file
          curl -L --fail https://ws.mwatelescope.org/static/mwa_full_embedded_element_pattern.h5 -o mwa_full_embedded_element_pattern.h5

          # Test each wheel with the matching Python version
          for whl in *.whl; do
            echo "Testing wheel: $whl"

            # Extract Python version from wheel name (e.g., cp310 -> 3.10)
            if [[ $whl =~ cp([0-9])([0-9]+) ]]; then
              py_major="${BASH_REMATCH[1]}"
              py_minor="${BASH_REMATCH[2]}"
              py_version="${py_major}.${py_minor}"

              # Check if this Python version is available
              if ! command -v "python${py_version}" &> /dev/null; then
                echo "Python ${py_version} not available, skipping wheel test"
                continue
              fi

              echo "Using Python ${py_version} for wheel $whl"
              "python${py_version}" -m venv test_venv
              . test_venv/bin/activate
              pip install --upgrade pip
              pip install numpy "$whl"

              # Test that calc_jones returns non-zero values
              cat > test_wheel.py << 'PYTEST'
          import numpy as np
          from mwa_hyperbeam import FEEBeam

          beam = FEEBeam('mwa_full_embedded_element_pattern.h5')
          J = beam.calc_jones_array(
              np.array([0.0]),
              np.array([0.0]),
              181e6,
              [0]*16,
              [1]*16,
              True
          )
          result = float(abs(J[0,0])**2)
          print(f'Result: {result}')
          assert result > 0.0, f'Expected non-zero result, got {result}'
          print('✓ Test passed: calc_jones returned non-zero value')
          PYTEST

              python test_wheel.py
              rm test_wheel.py

              deactivate
              rm -rf test_venv
            else
              echo "Could not determine Python version from wheel name: $whl"
            fi
          done

  create-rust-release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: CI
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable, minimal toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release on latest stable rust
        run: |
          sudo apt -y update
          sudo apt -y install libhdf5-dev pkg-config
          cargo build --release --features hdf5-static

      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --no-verify

  create-github-and-pypi-release:
    name: Create a new github and pypi release
    runs-on: ubuntu-latest
    needs: [create-rust-release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: CI
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        shell: bash
        run: |
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
              --generate-notes *.tar.gz

      - name: Place all python wheels into dir for publish to pypi
        run: |
          mkdir for_pypi
          tar xvf *-darwin-apple-m1-python.tar.gz -C for_pypi/ --wildcards "*.whl"
          tar xvf *-darwin-x86-64-python.tar.gz -C for_pypi/ --wildcards "*.whl"
          tar xvf *-linux-x86-64-python.tar.gz -C for_pypi/ --wildcards "*.whl"
          tar xvf *-linux-generic-python.tar.gz -C for_pypi/ --wildcards "*.whl"

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: for_pypi/
          password: ${{ secrets.PYPI_API_TOKEN }}

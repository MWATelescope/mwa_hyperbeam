---
name: Generate Coverage report

# Do this on every push that isn't tagged
on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -C target-cpu=native
  DEBIAN_FRONTEND: noninteractive
  MWA_BEAM_FILE: mwa_full_embedded_element_pattern.h5

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt -y update
          sudo apt -y install libhdf5-dev gpg

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache MWA beam file
        id: cache-beam
        uses: actions/cache@v4
        with:
          path: mwa_full_embedded_element_pattern.h5
          key: mwa-beam-file-v1

      - name: Download MWA beam file if cache was a miss
        if: steps.cache-beam.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            --retry-max-time 120 \
            https://ws.mwatelescope.org/static/mwa_full_embedded_element_pattern.h5 \
            -o mwa_full_embedded_element_pattern.h5

      - name: Generate code coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
